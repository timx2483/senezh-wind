<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d47a1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Сенеж · Ветер</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <div class="header__title">
      <h1>Сенеж · Ветер</h1>
      <p class="header__subtitle">виндсерф / кайт</p>
    </div>
    <button id="refresh-btn" class="btn btn--icon" title="Обновить" aria-label="Обновить данные">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 4v6h-6M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
    </button>
  </header>

  <main class="main">
    <section class="map-section">
      <div id="map" class="map"></div>
      <div id="wind-layer" class="wind-layer" aria-hidden="true"></div>
      <div class="legend" id="legend">
        <div class="legend__title">Скорость ветра · стрелка = куда дует</div>
        <div class="legend__scale">
          <span class="legend__item legend__item--light">до 4 м/с</span>
          <span class="legend__item legend__item--work">5–8 м/с</span>
          <span class="legend__item legend__item--strong">9–12 м/с</span>
          <span class="legend__item legend__item--danger">13+ м/с</span>
        </div>
      </div>
      <div id="map-wind-summary" class="map-wind-summary"></div>
    </section>

    <section class="cards" id="current-cards">
      <h2 class="section-title">Сейчас</h2>
      <div class="cards__grid" id="current-grid">
        <div class="card card--loading">Загрузка...</div>
      </div>
    </section>

    <section class="comparison-section">
      <h2 class="section-title">Сводка моделей · сейчас</h2>
      <div class="comparison-bar" id="comparison-bar"></div>
    </section>

    <section class="forecast-section">
      <h2 class="section-title">Сравнение моделей</h2>
      <div class="model-tabs" id="model-tabs"></div>
      <div class="forecast-table-wrap">
        <table class="forecast-table" id="forecast-table">
          <thead>
            <tr>
              <th>Время</th>
              <th id="model-col-header" hidden>Модель</th>
              <th>Ветер</th>
              <th>Напр.</th>
              <th>Давл.</th>
              <th>Осадки</th>
            </tr>
          </thead>
          <tbody id="forecast-tbody"></tbody>
        </table>
      </div>
    </section>

    <section class="chart-section">
      <h2 class="section-title">Ветер на 48 ч</h2>
      <div class="chart-wrap">
        <canvas id="wind-chart" height="160"></canvas>
      </div>
      <div class="chart-legend" id="chart-legend"></div>
    </section>

    <section class="stations-section" id="stations-section" hidden>
      <h2 class="section-title">Метеостанции рядом</h2>
      <div class="cards__grid" id="stations-grid"></div>
    </section>
  </main>

  <footer class="footer">
    <span id="updated-at">—</span>
    <span class="footer__sources">ICON · ECMWF · GFS · METAR UUEE</span>
  </footer>

  <div id="error-toast" class="toast" hidden></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
